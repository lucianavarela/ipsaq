<section class="hero is-primary">
    <div class="hero-body">
        <div class="columns">
            <div class="column is-1">
                <p class="control">
                    <button class="button is-rounded is-primary" [routerLink]="['/cancionero']">
                        <span class="icon">
                            <i class="fa-solid fa-2x fa-arrow-left"></i>
                        </span>
                    </button>
                </p>
            </div>
            <div class="column has-text-centered">
                <p class="title">{{ song.title }}</p>
            </div>
            <div class="column is-1">
                <p class="control" *ngIf="isLoggedIn()">
                    <button class="button is-rounded is-primary" [routerLink]="['editar']">
                        <span class="icon">
                            <i class="fa-solid fa-2x fa-pencil"></i>
                        </span>
                    </button>
                </p>
            </div>
        </div>
    </div>
</section>

<div class="container">
    <section class="section">
        <div class="columns">
            <div class="column">
                <p style="white-space: pre-wrap">{{song.lyrics}}</p>
            </div>
            <div class="column">
                <iframe *ngIf="song.link_original" width="560" height="315" [src]="song.link_original | transformYoutube | safeUrl" frameborder="0" allowfullscreen></iframe>
                <iframe *ngIf="song.link_ipsaq" width="560" height="315" [src]="song.link_ipsaq | transformYoutube | safeUrl" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>
    </section>
</div>
