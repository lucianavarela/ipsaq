<section class="hero is-light">
  <div class="hero-body">
    <div class="columns">
      <div class="column is-1">
        <p class="control">
          <button
            class="button is-rounded is-light"
            [routerLink]="['/cultos']"
          >
            <span class="icon">
              <i class="fa-solid fa-2x fa-arrow-left"></i>
            </span>
          </button>
        </p>
      </div>
      <div class="column has-text-centered">
        <p class="title">{{ sermon.title }}</p>
        <p class="subtitle">{{ sermon.date | date: "dd MMMM yyyy" }}</p>
      </div>
      <div class="column is-1">
        <p class="control" *ngIf="isLoggedIn()">
          <button
            class="button is-rounded is-light"
            [routerLink]="['editar']"
          >
            <span class="icon">
              <i class="fa-solid fa-2x fa-pencil"></i>
            </span>
          </button>
        </p>
      </div>
    </div>
  </div>
</section>

<div class="container">
  <section class="section" style="padding-bottom: 0;">
    <div class="columns is-centered" id="encargados">
        <div class="column">
            <div class="box link">
              <article class="media">
                <div class="media-left">
                  <span class="icon">
                    <i class="fa-solid fa-lg fa-book-bible"></i>
                  </span>
                </div>
                <div class="media-content">
                  <div class="content">
                      <small>Lectura</small><br/>
                    <strong>{{ sermon.bible_verse }}</strong>
                  </div>
                </div>
              </article>
            </div>
          </div>
      <div class="column">
        <div class="box info">
          <article class="media">
            <div class="media-left">
              <span class="icon">
                <i class="fa-solid fa-lg fa-guitar"></i>
              </span>
            </div>
            <div class="media-content">
              <div class="content">
                <small>Dirección</small><br/>
                <strong>{{ sermon.director }}</strong>
              </div>
            </div>
          </article>
        </div>
      </div>
      <div class="column">
        <div class="box warning">
          <article class="media">
            <div class="media-left">
              <span class="icon">
                <i class="fa-solid fa-lg fa-user-tie"></i>
              </span>
            </div>
            <div class="media-content">
              <div class="content">
                  <small>Predica</small><br/>
                <strong>{{ sermon.preacher }}</strong>
              </div>
            </div>
          </article>
        </div>
      </div>
    </div>

  <div *ngIf="sermon.link_youtube" class="box light has-text-centered">
    <div class="iframe-container">
    <iframe
      width="860"
      height="484"
      [src]="sermon.link_youtube | transformYoutube | safeUrl"
      frameborder="0"
      allowfullscreen
    ></iframe>
    </div>
  </div>
  </section>

  <section *ngIf="songs && songs.length" class="section">
    <h2 class="title is-2">Alabanza</h2>

    <div class="columns is-multiline">
      <div *ngFor="let song of songs" class="column is-narrow">
        <app-songs-box [sermonSongInput]="song"></app-songs-box>
      </div>
    </div>
  </section>
</div>
