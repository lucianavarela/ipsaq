<section class="hero is-link">
    <div class="hero-body">
        <div class="columns">
            <div class="column is-1">
                <p class="control">
                    <button class="button is-rounded is-link" [routerLink]="['/series']">
                        <span class="icon">
                            <i class="fa-solid fa-2x fa-arrow-left"></i>
                        </span>
                    </button>
                </p>
            </div>
            <div class="column has-text-centered">
                <p class="subtitle">Serie</p>
                <p class="title">{{ serie.name }}</p>
            </div>
        </div>
    </div>
</section>

<div class="container">
    <section *ngIf="serie.sermons && serie.sermons.length" class="section">
        <h2 class="title is-3">Capitulos</h2>
        <article class="sermon-list" *ngFor="let sermon of serie.sermons">
            <app-sermon-box [sermonInput]="sermon"></app-sermon-box>
        </article>
    </section>
</div>
