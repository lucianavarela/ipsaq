<div class="banner">
  <!--img src="assets/bienvenido.png" /-->
</div>
<div class="texture">
  <section class="section">
    <div class="columns is-centered has-text-centered boxes">
      <div class="column is-1"></div>
      <div class="column">
        <div class="box" [routerLink]="['cultos']">
          <img src="assets/bible.png" /><br/>
          <button class="button is-primary">Cultos</button>
        </div>
      </div>
      <div class="column is-1"></div>
      <div class="column">
        <div class="box" [routerLink]="['cancionero']">
          <img src="assets/songs.png" /><br/>
          <button class="button is-info">Cancionero</button>
        </div>
      </div>
      <div class="column is-1"></div>
      <div class="column">
        <div class="box" [routerLink]="['contacto']">
          <img src="assets/phone.png" /><br/>
          <button class="button is-light">Contactanos</button>
        </div>
      </div>
      <div class="column is-1"></div>
    </div>
  </section>
</div>
<div class="video">
  <section class="section">
    <div class="columns is-variable is-8">
      <div *ngIf="lastsSermons[2] && lastsSermons[2].link_youtube && !sermonIsLive" class="column has-text-centered">
        <h5 class="title is-5">
          <a [routerLink]="['cultos', lastsSermons[2].id]">{{lastsSermons[2].date | date: 'dd/MM/yy'}}</a>
        </h5>
        <div class="iframe-container">
          <iframe width="490" height="275" frameborder="0" allowfullscreen
            [src]="lastsSermons[2].link_youtube | transformYoutube | safeUrl"></iframe>
        </div>
      </div>
      <div *ngIf="lastsSermons[1] && lastsSermons[1].link_youtube && !sermonIsLive" class="column has-text-centered">
        <h5 class="title is-5">
          <a [routerLink]="['cultos', lastsSermons[1].id]">{{lastsSermons[1].date | date: 'dd/MM/yy'}}</a>
        </h5>
        <div class="iframe-container">
          <iframe width="490" height="275" frameborder="0" allowfullscreen
            [src]="lastsSermons[1].link_youtube | transformYoutube | safeUrl"></iframe>
        </div>
      </div>
      <div *ngIf="lastsSermons[0] && lastsSermons[0].link_youtube" class="column has-text-centered">


        <h5 class="title is-5">
          <a *ngIf="!upcomingSermon" class="has-text-primary" [routerLink]="['cultos', lastsSermons[0].id]">{{lastsSermons[0].date | date: 'dd/MM/yy'}}</a>
          <a *ngIf="upcomingSermon && !sermonIsLive" class="has-text-primary" [routerLink]="['cultos', lastsSermons[0].id]">Próximo Culto</a>
          <a *ngIf="sermonIsLive" class="has-text-primary" [routerLink]="['cultos', lastsSermons[0].id]">Culto de hoy
            <span class="tag is-danger has-text-white" style="background-color: #ff0000; padding-left: 4px !important;">
              <span class="icon"><i class="fa-solid fa-2xs fa-circle"></i></span>EN VIVO</span>
          </a>
        </h5>
        <div class="iframe-container">
          <iframe width="490" height="275" frameborder="0" allowfullscreen
            [src]="lastsSermons[0].link_youtube | transformYoutube: sermonIsLive | safeUrl"></iframe>
        </div>
      </div>
    </div>
  </section>
</div>
