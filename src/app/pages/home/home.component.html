<div class="main-cont">
  <div class="container">
    <section class="section">
      <div class="columns is-centered has-text-centered">
        <div class="column is-5">
          <div class="box">
            <article class="media">
              <div class="media-content">
                <div class="content">
                  <p>
                      <i style="white-space: pre-wrap"
                      >Tu amor es mejor que la vida;<br />
                      por eso mis labios te alabarán.<br />
                      Te bendeciré mientras viva,<br />
                      y alzando mis manos te invocaré.</i>
                      <br />
                    <strong>Salmo 63:3-4</strong>
                  </p>
                </div>
              </div>
            </article>
          </div>
        </div>
      </div>
      <div class="columns">
        <div
          *ngIf="lastSermon && lastSermon.link_youtube"
          class="column has-text-centered"
        >
          <h5 class="title is-5 has-text-white">Último Culto</h5>
          <div class="iframe-container">
            <iframe
              width="490"
              height="275"
              frameborder="0"
              allowfullscreen
              [src]="lastSermon.link_youtube | transformYoutube | safeUrl"
          ></iframe>
          </div>
        </div>
        <div
          *ngIf="upcomingSermon && upcomingSermon.link_youtube"
          class="column has-text-centered"
        >
          <h5 class="title is-5 has-text-white">Próximo Culto</h5>
          <div class="iframe-container">
          <iframe
            width="490"
            height="275"
            frameborder="0"
            allowfullscreen
            [src]="upcomingSermon.link_youtube | transformYoutube | safeUrl"
          ></iframe></div>
        </div>
      </div>
    </section>
  </div>
</div>
