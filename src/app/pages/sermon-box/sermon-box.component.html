<a class="box" *ngIf="sermon" [routerLink]="['/cultos', sermon.id]">
  <div class="columns is-desktop">
    <div *ngIf="sermon.chapter_number" class="column is-narrow">
      <strong>{{ sermon.chapter_number }}</strong>
    </div>
    <div *ngIf="sermon.title" class="column">
      <p>{{ sermon.title }}</p>
    </div>
    <div *ngIf="sermon.bible_verse" class="column is-narrow">
      <p><span class="icon has-text-dark">
        <i class="fa-solid fa-book-bible"></i>
      </span>
      {{ sermon.bible_verse }}</p>
    </div>
    <div *ngIf="sermon.date" class="column is-narrow">
      <p><span class="icon has-text-dark">
        <i class="fa-solid fa-calendar-alt"></i>
      </span>
      {{ sermon.date | date : "dd/MM/yy" }}</p>
    </div>
  </div>
</a>
